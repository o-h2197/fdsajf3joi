<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大事な話があります</title>

    <!-- パスワード認証 -->
    <script>
        const ACCESS_PASSWORD = "20230316";
        const input = prompt("いつ出会いなおしたっけな(yyyymmdd)");

        if (input !== ACCESS_PASSWORD) {
            document.addEventListener("DOMContentLoaded", () => {
                document.body.innerHTML = "<p style='padding:20px; font-size:1.4rem;'>アクセスできません</p>";
            });
            throw new Error("Unauthorized");
        }
    </script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="tapStart">画面を押下して始める</div>

<div id="wrapper">
    <div id="messageContainer">
        <div id="container"></div>

        <div id="buttons">
            <button id="yesBtn">はい</button>
            <button id="noBtn">いいえ</button>
        </div>
    </div>
</div>

<div id="overlay">
    <div id="overlayBg"></div>
    <div id="overlayContent">
        <div id="overlayText"></div>
        <div id="overlayButtons">
            <button id="overlayYes">はい</button>
            <button id="overlayNo">いいえ</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
