<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大切なあなたへ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<script>
// パスワードチェック
const pass = prompt("パスワードを入力してください");

if (pass !== "202406") {
    document.body.innerHTML = "<p style='padding:20px; font-size:1.2rem;'>アクセスできません</p>";
    throw new Error("Unauthorized");
}

// 本編HTMLを挿入（scriptタグは含めない）
document.body.innerHTML = `
<div id="container">
    <div class="line">今日、あなたに伝えたいことがあります。</div>
    <div class="line">一緒に過ごしてきた時間の中で、</div>
    <div class="line">あなたの優しさに何度も救われてきました。</div>
    <div class="line">これからの未来も、隣で笑っていてほしい。</div>
    <div class="line final">結婚してください。</div>

    <div id="buttons">
        <button id="yesBtn">はい</button>
        <button id="noBtn">いいえ</button>
    </div>

    <div id="yesMessage" class="hidden">
        ありがとう。これからもよろしくね。
    </div>
</div>
`;

// script.js を後から読み込む（これが安全で確実）
const s = document.createElement("script");
s.src = "script.js";
document.body.appendChild(s);
</script>
</body>
</html>
