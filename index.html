<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>大事な話があります</title>
    <link rel="stylesheet" href="style.css">
        <!-- ★ 最初のアクセスパスワード（document.write を使わない安全版） -->
    <script>
        const ACCESS_PASSWORD = "20230316"; // ← 好きなパスワードに変更
        const input = prompt("いつ出会いなおしたっけな(yyyymmdd)");

        if (input !== ACCESS_PASSWORD) {
            // ★ body が描画される前に完全に潰す
            document.addEventListener("DOMContentLoaded", () => {
                document.body.innerHTML = "<p style='padding:20px; font-size:1.4rem;'>アクセスできません</p>";
            });
            throw new Error("Unauthorized");
        }
    </script>
</head>
<body>

<div id="tapStart">
    画面を押下して始める
</div>

<div id="wrapper">
    <div id="messageContainer">
        <div id="container"></div>

        <div id="buttons">
            <button id="yesBtn">はい</button>
            <button id="noBtn">いいえ</button>
        </div>
    </div>
</div>

<div id="overlay">
    <div id="overlayBg"></div>
    <div id="overlayContent">
        <div id="overlayText"></div>
        <div id="overlayButtons">
            <button id="overlayYes">はい</button>
            <button id="overlayNo">いいえ</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
